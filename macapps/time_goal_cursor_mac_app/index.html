<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cursor HUD</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="cursor-tracker" class="glass">
        <span id="goal-icon">🎯</span>
        <span id="goal-text">FOCUS</span>
        <span class="divider">|</span>
        <span id="thanks-count">T:0</span>
        <span class="space"></span>
        <span id="sorry-count">S:0</span>
        <span class="divider">|</span>
        <span id="time-text">00:00 AM</span>
    </div>
    <script src="renderer.js"></script>
</body>
</html>
